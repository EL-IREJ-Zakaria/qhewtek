server {
    listen 80;
    server_name _;

    root /var/www/web;
    index index.html;
    client_max_body_size 6m;

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ^~ /api/ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/api/index.php;
        fastcgi_param SCRIPT_NAME /api/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/backend/api;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param PATH_INFO $uri;
        fastcgi_pass app:9000;
    }

    location = /api {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/api/index.php;
        fastcgi_param SCRIPT_NAME /api/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/backend/api;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param PATH_INFO /api;
        fastcgi_pass app:9000;
    }

    location ^~ /uploads/ {
        alias /var/www/backend/uploads/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
}
